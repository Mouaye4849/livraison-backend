spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?sslMode=REQUIRED
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=create 
spring.jpa.show-sql=true 
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
jwt.secret=${JWT_SECRET} 
jwt.expiration=86400000
stream.api.key=${STREAM_API_KEY} stream.api.secret=${STREAM_API_SECRET}
spring.web.resources.static-locations=classpath:/static/,file:uploads/

 
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=52MB
server.tomcat.max-http-form-post-size=52MB

bankily.base-url=${BANKILY_BASE_URL}
bankily.username=${BANKILY_USERNAME}
bankily.password=${BANKILY_PASSWORD}
bankily.client-id=${BANKILY_CLIENT_ID}

logging.level.com.livraison.backend.auth.BankilyAuthService=INFO

# ── GPS / WebSocket diagnostic logging ───────────────────────────────────────
logging.level.com.livraison.backend.config.WebSocketConfig=DEBUG
logging.level.com.livraison.backend.controller.GpsWsController=DEBUG
logging.level.com.livraison.backend.service.GpsWsService=DEBUG
logging.level.com.livraison.backend.service.GpsServiceImpl=DEBUG

# ── Log file — all GPS/WS output written here for offline inspection ─────────
logging.file.name=logs/wasali-backend.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=3
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n


# Use a Gmail App Password (not your normal password).
# Create one at: https://myaccount.google.com/apppasswords
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED}
